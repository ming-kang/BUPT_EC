name: CI

# Pull-request quality gate. Pushes to main are validated by the
# quality-gate job in release.yml, so this workflow only runs on PRs
# to avoid building everything twice.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read
