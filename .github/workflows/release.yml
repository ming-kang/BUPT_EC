name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.25"

      - name: Test Go packages
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint installer shell script
        run: shellcheck scripts/install.sh

  build-frontend:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist

  build-go:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: 0
      GOOS: linux
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.25"

      - name: Download frontend dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build Go binary
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "build/bupt-ec-linux-${GOARCH}"
          go build -o "build/bupt-ec-linux-${GOARCH}/bupt-ec" -v ./

      - name: Upload Go binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bupt-ec-linux-${{ matrix.goarch }}
          path: build/bupt-ec-linux-${{ matrix.goarch }}/bupt-ec

  release:
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: bupt-ec-linux-amd64
          path: release/bupt-ec-linux-amd64

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: bupt-ec-linux-arm64
          path: release/bupt-ec-linux-arm64

      - name: Compose release assets
        run: |
          set -euo pipefail
          cd release
          for arch in amd64 arm64; do
            cp ../.env.example ../README.md ../scripts/install.sh "bupt-ec-linux-${arch}/"
            chmod +x "bupt-ec-linux-${arch}/install.sh"
            tar -czf "bupt-ec-linux-${arch}.tar.gz" "bupt-ec-linux-${arch}"
          done
          cp ../scripts/install.sh install.sh
          chmod +x install.sh
          sha256sum bupt-ec-linux-*.tar.gz > checksums.txt
          ls -la

      - name: Attest release assets
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2.4.0
        with:
          subject-path: |
            release/bupt-ec-linux-amd64.tar.gz
            release/bupt-ec-linux-arm64.tar.gz
            release/checksums.txt
            release/install.sh

      - name: Upload dry-run release assets
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-dry-run
          path: |
            release/bupt-ec-linux-amd64.tar.gz
            release/bupt-ec-linux-arm64.tar.gz
            release/checksums.txt
            release/install.sh

      - name: Publish release (tag push - stable versioned)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/bupt-ec-linux-amd64.tar.gz
            release/bupt-ec-linux-arm64.tar.gz
            release/checksums.txt
            release/install.sh

      - name: Delete previous nightly release
        if: github.event_name == 'push' && github.ref_type == 'branch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Publish nightly release (main push)
        if: github.event_name == 'push' && github.ref_type == 'branch'
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          generate_release_notes: true
          files: |
            release/bupt-ec-linux-amd64.tar.gz
            release/bupt-ec-linux-arm64.tar.gz
            release/checksums.txt
            release/install.sh
