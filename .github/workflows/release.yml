name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist

  build-go:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: 0
      GOOS: linux
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.25"

      - name: Download frontend dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build Go binary
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "build/bupt-ec-linux-${GOARCH}"
          go build -o "build/bupt-ec-linux-${GOARCH}/bupt-ec" -v ./

      - name: Upload Go binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bupt-ec-linux-${{ matrix.goarch }}
          path: build/bupt-ec-linux-${{ matrix.goarch }}/bupt-ec

  release:
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bupt-ec-linux-amd64
          path: release/bupt-ec-linux-amd64

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bupt-ec-linux-arm64
          path: release/bupt-ec-linux-arm64

      - name: Compose release assets
        run: |
          set -euo pipefail
          cd release
          for arch in amd64 arm64; do
            cp ../.env.example ../README.md ../scripts/install.sh "bupt-ec-linux-${arch}/"
            chmod +x "bupt-ec-linux-${arch}/install.sh"
            tar -czf "bupt-ec-linux-${arch}.tar.gz" "bupt-ec-linux-${arch}"
          done
          cp ../scripts/install.sh install.sh
          chmod +x install.sh
          sha256sum bupt-ec-linux-*.tar.gz > checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/bupt-ec-linux-amd64.tar.gz
            release/bupt-ec-linux-arm64.tar.gz
            release/checksums.txt
            release/install.sh
