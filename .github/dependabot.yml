version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor:
        applies-to: version-updates
        update-types: [minor, patch]
    commit-message:
      prefix: "ci"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      npm-minor:
        applies-to: version-updates
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-minor:
        applies-to: version-updates
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(go)"
